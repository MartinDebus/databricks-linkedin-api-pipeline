resources:
  jobs:
    linkedin_ingest:
      name: linkedin-medallion

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${resources.schemas.bronze_linkedin.name}
        - name: volume
          default: ${resources.volumes.landing.name}
        - name: run_type
          default: ${var.run_type}

      tags:
        project: linkedin

      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: ../notebooks/ingest.ipynb
          environment_key: serverless

      environments:
        - environment_key: serverless
          spec:
            client: "4"
